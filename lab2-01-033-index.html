<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书商城</title>
    <link rel="stylesheet" href="css/lab2-01-033-index.css">
</head>
<body>
    <div class="header">
        <div class="logo">
            <img src="img/logo.png" alt="图书商城logo">
        </div>
        <ul class="nav">
            <a href="#">首页</a>
            <a href="#">图书分类</a>
            <a href="#">促销活动</a>
            <a href="#">我的书架</a>
        </ul>
    </div>
    <div class="container">
        <div class="left">
            <h3>图书分类</h3>
            <ul>
                <li><a href="#">英语类</a></li>
                <li><a href="#">文学类</a></li>
                <li><a href="#">地理类</a></li>
                <li><a href="#">计算机类</a></li>
            </ul>
        </div>
        <div class="middle">
            <h3>图书展示</h3>
            <div class="book-item">
                <img src="img/book1.jpg">
                <img src="img/book2.jpg">
            </div>
            <h3>热门推荐</h3>
            <div class="hot">
                <img src="img/book4.jpg">
                <img src="img/living.jpg">
                <img src="img/three bodies.jpg">
            </div>
            <h3>新书上市</h3>
            <table border="1" width="100%">
                <tr>
                    <td>书名</td>
                    <td>价格</td>
                </tr>
                <tr>
                    <td>HTML从入门到精通</td>
                    <td>59元</td>
                </tr>
                <tr>
                    <td>CSS设计指南</td>
                    <td>49元</td>
                </tr>
            </table>
        </div>
        <div class="right">
            <h4>促销信息</h4>
            <p>全场图书8折优惠</p>
            <p>满100减20</p>
            <p>新书限时抢购</p>
        </div>
    </div>
</body>
</html>
